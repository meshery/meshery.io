<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D3A9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a9d84;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="16" fill="url(#bgGrad)"/>
  <!-- Hexagon shape -->
  <polygon
    points="50,12 88,32 88,68 50,88 12,68 12,32"
    fill="none"
    stroke="#ffffff"
    stroke-width="5"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
  <!-- Center grid lines for polygon drawing concept -->
  <line x1="50" y1="12" x2="50" y2="88" stroke="#ffffff" stroke-width="3" opacity="0.7"/>
  <line x1="12" y1="50" x2="88" y2="50" stroke="#ffffff" stroke-width="3" opacity="0.7"/>
  <!-- Vertex points -->
  <circle cx="50" cy="12" r="5" fill="#ffffff"/>
  <circle cx="88" cy="32" r="5" fill="#ffffff"/>
  <circle cx="88" cy="68" r="5" fill="#ffffff"/>
  <circle cx="50" cy="88" r="5" fill="#ffffff"/>
  <circle cx="12" cy="68" r="5" fill="#ffffff"/>
  <circle cx="12" cy="32" r="5" fill="#ffffff"/>
</svg>
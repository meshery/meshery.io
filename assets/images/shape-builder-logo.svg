<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient fill -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#19e3c6"/>
      <stop offset="100%" stop-color="#0a7f86"/>
    </linearGradient>

    <!-- Triangle pattern -->
    <pattern id="triPattern" width="100" height="86" patternUnits="userSpaceOnUse">
      
      <!-- Up triangle -->
      <polygon points="50,0 100,86 0,86" fill="url(#grad)" stroke="#111" stroke-width="6"/>
      
      <!-- Down triangle -->
      <polygon points="0,0 100,0 50,86" fill="url(#grad)" stroke="#111" stroke-width="6"/>
    
    </pattern>
  </defs>

  <!-- Background fill with pattern -->
  <rect width="100%" height="100%" fill="url(#triPattern)"/>
</svg>
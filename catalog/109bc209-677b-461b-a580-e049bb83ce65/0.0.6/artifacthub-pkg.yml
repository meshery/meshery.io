version: 0.0.6
name: hello_wasm_config
displayName: Hello_Wasm_config
createdAt: "2026-07-20T07:49:21Z"
description: |
    Hello Wasm — a Dapr sample that serves HTTP responses directly from the Dapr
    sidecar using WebAssembly (WASM) middleware, with no separate application
    required. The design contains two Dapr resources: a Configuration (appconfig)
    that enables a WASM handler in the HTTP pipeline, and a Component (wasm) of type
    middleware.http.wasm that loads the WASM binary. Useful as a starting point for
    building custom, embedded HTTP middleware in Dapr.

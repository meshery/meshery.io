readme: "- Targets Dapr runtime v1.10; the WASM binary must be http-wasm compatible.\n- The Component references the binary via a local path (file://wasm/main.wasm),\n  so the .wasm file must be available to the sidecar at that location.\n- The original sample runs in self-hosted (local) Dapr; deploying to Kubernetes\n  requires adjusting the binary source and resource paths.\n- This design does not include the compiled main.wasm binary itself.\n \n ##h4 Caveats and Consideration \n"
install: mesheryctl design import -f

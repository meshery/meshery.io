<div class="testimonials-wrapper">

  <h2>Hear what other users have to say...</h2>
  <div class="slider">
    {% for testimonial in site.data.testimonials %}
    <div class="bq-section">
      <div class="type-one-wrapper type-one-wrapper-boxed">
        <div class="bq-quote type-one-quote">
          <div class="type-one-quote-userpic"><img src="{{ testimonial.image }}" alt="testimonial image"></div>
          <div class="type-one-quote-qmark">&#10077;</div>
          <div class="type-one-quote-pattern"></div>
          <div class="type-one-quote-base">
            <blockquote class="type-one-quote-text">{{ testimonial.quote }}</blockquote>
            <div class="type-one-quote-meta">
              <div class="type-one-meta-info">
                <div class="type-one-author"><cite>{{ testimonial.person | default: "" }}</cite></div>
                <div class="type-one-source"><span>{{ testimonial.title | default: "" }}</span></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
